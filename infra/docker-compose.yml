version: "3.9"

services:
  # ── NeuralServe inference server ───────────────────────────────────────────
  neuralserve:
    build:
      context: ..
      dockerfile: infra/Dockerfile.serving
    image: neuralserve:latest
    container_name: neuralserve
    ports:
      - "8000:8000"
    environment:
      - MODEL_PATH=${MODEL_PATH:-meta-llama/Meta-Llama-3.1-8B}
      - ADAPTER_PATH=${ADAPTER_PATH:-}
      - REDIS_URL=redis://redis:6379
      - OTLP_ENDPOINT=${OTLP_ENDPOINT:-}
      - MAX_BATCH_SIZE=${MAX_BATCH_SIZE:-8}
      - MAX_WAIT_MS=${MAX_WAIT_MS:-50}
      - CACHE_TTL_SECONDS=${CACHE_TTL_SECONDS:-3600}
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - ../outputs:/app/outputs:ro
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  # ── Redis (KV cache with LFU eviction) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: neuralserve-redis
    command: >
      redis-server
      --maxmemory 2gb
      --maxmemory-policy allkeys-lfu
      --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: neuralserve-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    ports:
      - "9090:9090"
    depends_on:
      - neuralserve
    restart: unless-stopped

  # ── Grafana ────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: neuralserve-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
    volumes:
      - grafana_data:/var/lib/grafana
      - ../observability/dashboards:/var/lib/grafana/dashboards:ro
      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
