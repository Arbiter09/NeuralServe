name: CI — Lint & Test

on:
  push:
    branches: ["main", "dev", "feature/**"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Ruff Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check . --output-format=github

  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install serving dependencies + test extras
        run: |
          pip install --upgrade pip
          pip install -r requirements-serving.txt
          pip install pytest pytest-asyncio fakeredis httpx anyio

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short

      - name: Run integration tests (no GPU)
        run: >
          pytest tests/integration/test_api_endpoints.py -v --tb=short
          --ignore=tests/integration/test_inference_pipeline.py

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results
          path: .pytest_cache/
